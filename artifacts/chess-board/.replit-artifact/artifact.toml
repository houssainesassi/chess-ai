kind = "web"
previewPath = "/"
title = "Chess Board"
version = "1.0.0"
id = "artifacts/chess-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21592

[services.development]
run = "pnpm --filter @workspace/chess-board run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chess-board", "run", "build" ]
publicDir = "artifacts/chess-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21592"
BASE_PATH = "/"
